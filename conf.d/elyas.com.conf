server {
        listen 443 ssl http2;
        server_name       elyas.com;
        access_log        /var/www/logs/elyas_access.log;
        error_log         /var/www/logs/elyas_error.log;
        root              /var/www/elyas.com;
        index             index.html;
        server_tokens     off;

################ SSL ################

        ssl on;
        ssl_certificate           /etc/ssl/certs/new2021/cert.crt;
        ssl_certificate_key       /etc/ssl/certs/new2021/cert.pem;
        ssl_trusted_certificate   /etc/ssl/certs/new2021/chain.pem;

################ redirect www to nowww ################

      if ($host = 'www.elyas.com' ) {
         rewrite  ^/(.*)$  https://elyas.com/$1  permanent;
      }

################ SECURITY ################

      ## Only allow these request methods ##
## Do not accept DELETE, SEARCH and other methods ##
     if ($request_method !~ ^(GET|HEAD|POST)$ ) {
         return 444;
     }

        add_header X-XSS-Protection          "1; mode=block" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy   "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;
        add_header Permissions-Policy        "interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=2592000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN";
        add_header X-Whome                   "l-cbz02";

########### Status Monitor ###########

         location /nginx_status {
             stub_status   on;
             access_log    off;
             allow         172.27.2.173;
             deny          all;
         }



         location / {
                         # Headers
                  proxy_set_header X-Forwarded-For $remote_addr;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-NginX-Proxy true;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header X-forward-for $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-Forwarded-Host  $host;
                  proxy_set_header X-Forwarded-Port  $server_port;

                  proxy_redirect off;
                  proxy_http_version 1.1;
                  proxy_next_upstream error timeout http_502;

                         # Proxy timeouts
                  proxy_connect_timeout 60s;
                  proxy_send_timeout    60s;
                  proxy_read_timeout    40s;

                  #proxy_pass http://localhost:3000;
        }

        location ^~ /data {
                deny all;
                access_log off;
                log_not_found off;
        }

        location ~ /\.ht {
                deny all;
                access_log off;
                log_not_found off;
        }

        location ~ /\.(?!well-known) {
                deny all;
                access_log off;
                log_not_found off;
        }

        location = /favicon.ico {
                log_not_found off;
                access_log    off;
        }

        location = /robots.txt {
                log_not_found off;
                access_log    off;
        }


        fastcgi_read_timeout   300;
        gzip                   on;
        gzip_comp_level        6;
        gzip_disable           "MSIE [1-6]\\.(?!.*SV1)";
        gzip_proxied           any;
        gzip_types             text/plain text/css application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/x-icon image/bmp image/svg+xml;
        gzip_vary               on;

}


server {
        listen 80;
        server_name       elyas.com;
        server_tokens     off;
        access_log        off;
        error_log         off;
        root              /var/www/elyas.com;
        index             index.html;

        location ~ /.well-known {
                        allow all;
        }
       return 301 http://$server_name$request_uri;
    }
